<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bookmark Shelf</title>
    <script src="src/surface.js"></script>
    <link rel="stylesheet" href="src/styles.css?v=visvim-7">
  </head>
  <body class="sidepanel-shell">
    <div id="app" class="app" data-layout="grouped" data-density="cards">
      <header class="topbar">
        <div>
          <h1>Bookmark Shelf</h1>
          <p id="statsText">ブックマークを読み込み中</p>
        </div>
        <div class="top-actions">
          <button id="openFullButton" class="icon-button" title="大きな画面で開く" aria-label="大きな画面で開く">□</button>
          <button id="batchModeButton" class="icon-button" type="button" title="一括選択モード" aria-label="一括選択モード">☑</button>
          <button id="trayModeButton" class="icon-button" type="button" title="未整理トレイ" aria-label="未整理トレイ">◇</button>
          <button id="organizeSessionButton" class="icon-button" type="button" title="整理セッション" aria-label="整理セッション">▶</button>
          <button id="domainMoveButton" class="icon-button" type="button" title="ドメイン別まとめ移動" aria-label="ドメイン別まとめ移動">◎</button>
          <button id="undoButton" class="icon-button" type="button" title="操作取り消し" aria-label="操作取り消し" disabled>↶</button>
          <button id="deleteModeButton" class="icon-button" title="削除モード" aria-label="削除モード" aria-pressed="false"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash3 trash-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false"><path d="M6.5 1h3a.5.5 0 0 1 .5.5v1H6v-1a.5.5 0 0 1 .5-.5M11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3A1.5 1.5 0 0 0 5 1.5v1H1.5a.5.5 0 0 0 0 1h.538l.853 10.66A2 2 0 0 0 4.885 16h6.23a2 2 0 0 0 1.994-1.84l.853-10.66h.538a.5.5 0 0 0 0-1zm1.958 1-.846 10.58a1 1 0 0 1-.997.92h-6.23a1 1 0 0 1-.997-.92L3.042 3.5zm-7.487 1a.5.5 0 0 1 .528.47l.5 8.5a.5.5 0 0 1-.998.06L5 5.03a.5.5 0 0 1 .47-.53Zm5.058 0a.5.5 0 0 1 .47.53l-.5 8.5a.5.5 0 1 1-.998-.06l.5-8.5a.5.5 0 0 1 .528-.47M8 4.5a.5.5 0 0 1 .5.5v8.5a.5.5 0 0 1-1 0V5a.5.5 0 0 1 .5-.5"/></svg></button>
          <button id="checkLinksButton" class="icon-button" type="button" title="表示中のリンク切れを確認" aria-label="表示中のリンク切れを確認">⛓</button>
          <button id="openBehaviorButton" class="icon-button" title="開き方を切り替え" aria-label="開き方を切り替え">↗</button>
          <button id="settingsButton" class="icon-button" title="設定" aria-label="設定">⚙</button>
          <button id="themeToggleButton" class="icon-button" title="ダークモード切り替え" aria-label="ダークモード切り替え">◐</button>
          <button id="languageToggleButton" class="icon-button" type="button" title="Switch to English" aria-label="Switch to English">EN</button>
          <button id="overlayCloseButton" class="icon-button overlay-only" type="button" title="閉じる" aria-label="閉じる">×</button>
          <button id="refreshButton" class="icon-button" title="再読み込み" aria-label="再読み込み">↻</button>
        </div>
      </header>
      <main class="content">
        <section class="control-strip" aria-label="表示設定">
          <label class="search-box">
            <span aria-hidden="true">⌕</span>
            <input id="searchInput" type="search" placeholder="名前、URL、ジャンルで絞り込み">
          </label>
          <label class="sort-box">
            <span aria-hidden="true">⇅</span>
            <select id="sortSelect" title="並び順" aria-label="並び順">
              <option value="registered">登録順</option>
              <option value="newest">新しい順</option>
              <option value="name">名前順</option>
              <option value="used">よく使う順</option>
              <option value="site">サイト順</option>
            </select>
          </label>
          <div class="segmented" role="group" aria-label="表示比率">
            <button id="groupedViewButton" class="active" type="button" title="ブックマーク一覧を広く表示" aria-label="ブックマーク一覧を広く表示">▤</button>
            <button id="listViewButton" type="button" title="よく使うものを広く表示" aria-label="よく使うものを広く表示"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-bookmark-star-fill bookmark-star-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false"><path fill-rule="evenodd" d="M2 15.5V2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v13.5a.5.5 0 0 1-.74.439L8 13.069l-5.26 2.87A.5.5 0 0 1 2 15.5M8.16 4.1a.178.178 0 0 0-.32 0l-.634 1.285a.18.18 0 0 1-.134.098l-1.42.206a.178.178 0 0 0-.098.303L6.58 6.993c.042.041.061.1.051.158L6.39 8.565a.178.178 0 0 0 .258.187l1.27-.668a.18.18 0 0 1 .165 0l1.27.668a.178.178 0 0 0 .257-.187L9.368 7.15a.18.18 0 0 1 .05-.158l1.028-1.001a.178.178 0 0 0-.098-.303l-1.42-.206a.18.18 0 0 1-.134-.098z"/></svg></button>
          </div>
          <div class="segmented" role="group" aria-label="簡易表示切り替え">
            <button id="cardDensityButton" class="active" type="button" title="アイコン一覧表示" aria-label="アイコン一覧表示">◧</button>
            <button id="compactDensityButton" type="button" title="名前だけの簡易表示" aria-label="名前だけの簡易表示">≡</button>
          </div>
          <label class="saved-view-box">
            <span aria-hidden="true">◉</span>
            <select id="savedViewSelect" title="保存済みビュー" aria-label="保存済みビュー">
              <option value="">保存済みビュー</option>
            </select>
          </label>
          <button id="saveViewButton" class="icon-button" type="button" title="現在のビューを保存" aria-label="現在のビューを保存">＋</button>
          <button id="deleteViewButton" class="icon-button" type="button" title="保存済みビューを削除" aria-label="保存済みビューを削除" disabled><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash3 trash-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false"><path d="M6.5 1h3a.5.5 0 0 1 .5.5v1H6v-1a.5.5 0 0 1 .5-.5M11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3A1.5 1.5 0 0 0 5 1.5v1H1.5a.5.5 0 0 0 0 1h.538l.853 10.66A2 2 0 0 0 4.885 16h6.23a2 2 0 0 0 1.994-1.84l.853-10.66h.538a.5.5 0 0 0 0-1zm1.958 1-.846 10.58a1 1 0 0 1-.997.92h-6.23a1 1 0 0 1-.997-.92L3.042 3.5zm-7.487 1a.5.5 0 0 1 .528.47l.5 8.5a.5.5 0 0 1-.998.06L5 5.03a.5.5 0 0 1 .47-.53Zm5.058 0a.5.5 0 0 1 .47.53l-.5 8.5a.5.5 0 1 1-.998-.06l.5-8.5a.5.5 0 0 1 .528-.47M8 4.5a.5.5 0 0 1 .5.5v8.5a.5.5 0 0 1-1 0V5a.5.5 0 0 1 .5-.5"/></svg></button>
        </section>
        <section id="batchBar" class="batch-bar hidden" aria-label="一括操作">
          <span id="selectedCountText">0件選択中</span>
          <select id="batchCategorySelect" title="移動先ジャンル" aria-label="移動先ジャンル"></select>
          <button id="selectVisibleButton" class="icon-button" type="button" title="表示中をすべて選択" aria-label="表示中をすべて選択">☷</button>
          <button id="clearSelectionButton" class="icon-button" type="button" title="選択解除" aria-label="選択解除">×</button>
          <button id="batchMoveButton" class="icon-button" type="button" title="選択分をジャンル移動" aria-label="選択分をジャンル移動">⇄</button>
          <button id="batchPinButton" class="icon-button" type="button" title="選択分を固定" aria-label="選択分を固定"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-bookmark-star-fill bookmark-star-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false"><path fill-rule="evenodd" d="M2 15.5V2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v13.5a.5.5 0 0 1-.74.439L8 13.069l-5.26 2.87A.5.5 0 0 1 2 15.5M8.16 4.1a.178.178 0 0 0-.32 0l-.634 1.285a.18.18 0 0 1-.134.098l-1.42.206a.178.178 0 0 0-.098.303L6.58 6.993c.042.041.061.1.051.158L6.39 8.565a.178.178 0 0 0 .258.187l1.27-.668a.18.18 0 0 1 .165 0l1.27.668a.178.178 0 0 0 .257-.187L9.368 7.15a.18.18 0 0 1 .05-.158l1.028-1.001a.178.178 0 0 0-.098-.303l-1.42-.206a.18.18 0 0 1-.134-.098z"/></svg></button>
          <button id="batchUnpinButton" class="icon-button" type="button" title="選択分の固定解除" aria-label="選択分の固定解除">☆</button>
          <button id="batchDeleteButton" class="icon-button" type="button" title="選択分を削除" aria-label="選択分を削除"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash3 trash-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false"><path d="M6.5 1h3a.5.5 0 0 1 .5.5v1H6v-1a.5.5 0 0 1 .5-.5M11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3A1.5 1.5 0 0 0 5 1.5v1H1.5a.5.5 0 0 0 0 1h.538l.853 10.66A2 2 0 0 0 4.885 16h6.23a2 2 0 0 0 1.994-1.84l.853-10.66h.538a.5.5 0 0 0 0-1zm1.958 1-.846 10.58a1 1 0 0 1-.997.92h-6.23a1 1 0 0 1-.997-.92L3.042 3.5zm-7.487 1a.5.5 0 0 1 .528.47l.5 8.5a.5.5 0 0 1-.998.06L5 5.03a.5.5 0 0 1 .47-.53Zm5.058 0a.5.5 0 0 1 .47.53l-.5 8.5a.5.5 0 1 1-.998-.06l.5-8.5a.5.5 0 0 1 .528-.47M8 4.5a.5.5 0 0 1 .5.5v8.5a.5.5 0 0 1-1 0V5a.5.5 0 0 1 .5-.5"/></svg></button>
        </section>
        <aside class="quick-stack">
          <section class="quick-section">
            <div class="section-heading">
              <h2>よく使うもの</h2>
              <div class="heading-actions">
                <button id="quickFullButton" class="icon-button" type="button" title="よく使うものをフル表示" aria-label="よく使うものをフル表示">⛶</button>
                <button id="toggleQuickButton" class="icon-button" type="button" title="よく使うものを折りたたむ" aria-label="よく使うものを折りたたむ">▴</button>
                <button id="clearUsageButton" class="icon-button" type="button" title="履歴リセット" aria-label="履歴リセット">↺</button>
              </div>
            </div>
            <div id="frequentList" class="bookmark-grid"></div>
          </section>
          <section class="recent-section">
            <div class="section-heading">
              <h2>最近追加</h2>
              <div class="heading-actions">
                <button id="toggleRecentButton" class="icon-button" type="button" title="最近追加を折りたたむ" aria-label="最近追加を折りたたむ">▴</button>
              </div>
            </div>
            <div id="recentList" class="bookmark-grid"></div>
          </section>
        </aside>
        <section class="workspace">
          <aside class="genre-panel">
            <div class="section-heading">
              <h2>ジャンル</h2>
              <div class="heading-actions">
                <button id="toggleGenreButton" class="icon-button" type="button" title="ジャンルを折りたたむ" aria-label="ジャンルを折りたたむ">◂</button>
                <button id="manageGenresButton" class="icon-button" type="button" title="ジャンル編集" aria-label="ジャンル編集">⚙</button>
                <button id="showUnsortedButton" class="icon-button" type="button" title="未分類を表示" aria-label="未分類を表示">?</button>
              </div>
            </div>
            <div id="genreList" class="genre-list"></div>
          </aside>
          <section class="bookmark-panel">
            <div id="bookmarkSections" class="bookmark-sections"></div>
          </section>
        </section>
      </main>
      <dialog id="editDialog" class="edit-dialog">
        <form method="dialog">
          <div class="dialog-header">
            <h2>ブックマーク編集</h2>
            <button class="icon-button" value="cancel" aria-label="閉じる" title="閉じる">×</button>
          </div>
          <input id="editId" type="hidden">
          <label>名前<input id="editTitle" type="text"></label>
          <label>URL<input id="editUrl" type="url"></label>
          <label>ジャンル<input id="editCategory" type="text" list="categoryOptions"></label>
          <datalist id="categoryOptions"></datalist>
          <label class="check-row"><input id="editPinned" type="checkbox">よく使うものに固定</label>
          <div class="dialog-actions">
            <button id="deleteButton" class="danger icon-button" value="delete" type="button" title="削除" aria-label="削除"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash3 trash-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false"><path d="M6.5 1h3a.5.5 0 0 1 .5.5v1H6v-1a.5.5 0 0 1 .5-.5M11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3A1.5 1.5 0 0 0 5 1.5v1H1.5a.5.5 0 0 0 0 1h.538l.853 10.66A2 2 0 0 0 4.885 16h6.23a2 2 0 0 0 1.994-1.84l.853-10.66h.538a.5.5 0 0 0 0-1zm1.958 1-.846 10.58a1 1 0 0 1-.997.92h-6.23a1 1 0 0 1-.997-.92L3.042 3.5zm-7.487 1a.5.5 0 0 1 .528.47l.5 8.5a.5.5 0 0 1-.998.06L5 5.03a.5.5 0 0 1 .47-.53Zm5.058 0a.5.5 0 0 1 .47.53l-.5 8.5a.5.5 0 1 1-.998-.06l.5-8.5a.5.5 0 0 1 .528-.47M8 4.5a.5.5 0 0 1 .5.5v8.5a.5.5 0 0 1-1 0V5a.5.5 0 0 1 .5-.5"/></svg></button>
            <span></span>
            <button class="icon-button" value="cancel" title="キャンセル" aria-label="キャンセル">×</button>
            <button id="saveButton" class="icon-button" value="save" type="button" title="保存" aria-label="保存">✓</button>
          </div>
        </form>
      </dialog>
      <dialog id="genreDialog" class="edit-dialog">
        <form method="dialog">
          <div class="dialog-header">
            <h2>ジャンル編集</h2>
            <button class="icon-button" value="cancel" aria-label="閉じる" title="閉じる">×</button>
          </div>
          <div class="genre-add-row">
            <input id="newGenreInput" type="text" placeholder="新しいジャンル">
            <button id="addGenreButton" class="icon-button" type="button" title="追加" aria-label="追加">＋</button>
          </div>
          <div id="genreEditorList" class="genre-editor-list"></div>
        </form>
      </dialog>
      <dialog id="settingsDialog" class="edit-dialog">
        <form method="dialog">
          <div class="dialog-header">
            <h2>設定</h2>
            <button class="icon-button" value="cancel" aria-label="閉じる" title="閉じる">×</button>
          </div>
          <label class="settings-row">起動方法
            <select id="launchModeSelect">
              <option value="sidepanel">サイドバー</option>
              <option value="overlay" selected>サイト上に重ねる</option>
            </select>
          </label>
          <label class="check-row"><input id="floatingButtonEnabled" type="checkbox" checked>フローティング起動ボタンを表示</label>
          <label class="check-row"><input id="floatingButtonCollapsed" type="checkbox">フローティング起動ボタンを縮小表示</label>
          <label class="settings-row">フローティングボタン形状
            <select id="floatingButtonShape">
              <option value="rail" selected>縦バー</option>
              <option value="tab">サイドタブ</option>
              <option value="button">丸ボタン</option>
              <option value="diamond">ひし形ボタン</option>
            </select>
          </label>
          <label class="settings-row">起動バー色
            <select id="floatingButtonColor">
              <option value="dark" selected>標準（現在の色）</option>
              <option value="light">白透明</option>
            </select>
          </label>
          <label class="settings-row">フローティングボタンサイズ
            <input id="floatingButtonSize" type="range" min="34" max="120" step="2" value="46">
          </label>
          <label class="settings-row">重ね表示の背景透明度
            <input id="overlayOpacityInput" type="range" min="45" max="98" step="1" value="86">
          </label>
          <label class="check-row"><input id="requireCategorySelection" type="checkbox" checked>ジャンル選択まで一覧を表示しない</label>
          <label class="settings-row">カード幅
            <input id="cardSizeInput" type="range" min="150" max="280" step="10" value="205">
          </label>
          <p id="settingsNote" class="settings-note">設定は基本的にすぐ反映されます。フローティングボタンが出ない既存タブはページを再読み込みしてください。</p>
        </form>
      </dialog>
      <dialog id="organizeDialog" class="edit-dialog organize-dialog">
        <form method="dialog">
          <div class="dialog-header">
            <h2>整理セッション</h2>
            <button class="icon-button" value="cancel" aria-label="閉じる" title="閉じる">×</button>
          </div>
          <div id="organizeProgress" class="suggestion"></div>
          <div id="organizeCard" class="organize-card"></div>
          <div id="organizeCategoryList" class="organize-category-list"></div>
          <div class="dialog-actions organize-actions">
            <button id="organizeDeleteButton" class="danger icon-button" value="delete" type="button" title="削除" aria-label="削除">⌫</button>
            <span></span>
            <button id="organizeOpenButton" class="icon-button" type="button" title="開く" aria-label="開く">↗</button>
            <button id="organizeSkipButton" class="icon-button" type="button" title="次へ" aria-label="次へ">›</button>
          </div>
        </form>
      </dialog>
      <dialog id="domainDialog" class="edit-dialog domain-dialog">
        <form method="dialog">
          <div class="dialog-header">
            <h2>ドメイン別まとめ移動</h2>
            <button class="icon-button" value="cancel" aria-label="閉じる" title="閉じる">×</button>
          </div>
          <div id="domainGroupList" class="domain-group-list"></div>
        </form>
      </dialog>
    </div>
    <script src="src/app.js" type="module"></script>
  </body>
</html>
